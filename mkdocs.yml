site_name: PlainShelf
site_description: A local-first personal reading library for plain text books
repo_url: https://github.com/voilelab/plainshelf
repo_name: voilelab/plainshelf

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Data Model: concepts/data-model.md
      - Layers: concepts/layers.md
  - Development:
      - Local Setup: development/setup.md
      - Docker: development/docker.md
  - Known Issues: known-issue.md
