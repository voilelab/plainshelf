server_conf:
  addr: "0.0.0.0:20000"
  read_timeout: 60s
  write_timeout: 60s

app_conf:
  shelf_path: "/data/shelf"
  store_path: "/data/store"
  cover_to_jpg: true
  read_history_limit: 100
  security:
    # Explicitly unsafe for container deployments; put PlainShelf behind a trusted
    # local-only port mapping, reverse proxy auth, VPN boundary, or future password mode.
    mode: "none"
