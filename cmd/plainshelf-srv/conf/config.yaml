logger:
  level: info  # log level: debug, info, warn, error
  format: json # log format: json, text
  log_file:
    type: stderr

server_conf:
  addr: "127.0.0.1:20000"
  read_timeout: 60s
  write_timeout: 60s

app_conf:
  logger:
  level: info  # log level: debug, info, warn, error
  format: json # log format: json, text
  log_file:
    type: filename_rotate # log file type: stdout, stderr, none, filename, filename_rotate
    dir: ./logs
    prefix: root
  shelf_path: "./shelf"
  store_path: "./store"
  cover_to_jpg: true
  read_history_limit: 100
  security:
    mode: "local_token"
    protect_read: false
    token_header: "X-PlainShelf-Token"
    allow_missing_origin_with_token: true
    allowed_origins:
      - "http://127.0.0.1:20000"
      - "http://localhost:20000"
      - "http://127.0.0.1:5173"
      - "http://localhost:5173"
